<!DOCTYPE html>
<html>
<head>
<title>InfinityBTC</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

/* HEADER */
header {
  background:white;
  border-bottom:1px solid #ddd;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-weight:bold;
  font-size:20px;
}

.menu {
  display:flex;
  gap:20px;
}

.menu a {
  text-decoration:none;
  color:black;
  cursor:pointer;
}

.cart {
  cursor:pointer;
  font-weight:bold;
}

/* SECTIONS */
.section {
  display:none;
  padding:40px;
  text-align:center;
}

.active {
  display:block;
}

/* HERO */
.hero {
  background:white;
  padding:80px 20px;
}

/* PRODUCTS */
.grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  background:white;
  border:1px solid #ddd;
  margin:15px;
  padding:20px;
  width:220px;
}

button {
  background:#0d57a1;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}
</style>

</head>

<body>

<header>
<div class="logo">InfinityBTC</div>

<div class="menu">
<a onclick="show('home')">Home</a>
<a onclick="show('catalogue')">Catalogue</a>
<a onclick="show('account')">Account</a>
</div>

<div class="cart" onclick="show('cart')">
🛒 <span id="count">0</span>
</div>
</header>

<!-- HOME -->
<div id="home" class="section active">
<div class="hero">
<h1>Infinity BTC Cards</h1>
<p>Premium physical Bitcoin collectibles</p>
</div>
</div>

<!-- CATALOGUE -->
<div id="catalogue" class="section">
<h2>Catalogue</h2>

<div class="grid">

<div class="card">
<h3>Black Edition</h3>
<p>0.1 BTC</p>
<button onclick="add()">Add to cart</button>
</div>

<div class="card">
<h3>Bronze Edition</h3>
<p>0.0001 BTC</p>
<button onclick="add()">Add to cart</button>
</div>

</div>
</div>

<!-- ACCOUNT -->
<div id="account" class="section">
<h2>Account</h2>
<input id="email" placeholder="Email"><br><br>
<input placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<!-- CART -->
<div id="cart" class="section">
<h2>Your Cart</h2>
<p id="cartText">Empty</p>
</div>

<script>
function show(page){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(page).classList.add('active');
}

function login(){
localStorage.setItem("user","ok");
alert("Logged in");
show("catalogue");
}

function add(){
if(!localStorage.getItem("user")){
alert("Login first");
show("account");
return;
}

let count = localStorage.getItem("count") || 0;
count++;
localStorage.setItem("count", count);
document.getElementById("count").innerText = count;

document.getElementById("cartText").innerText = count + " item(s)";
}
</script>

</body>
</html>
