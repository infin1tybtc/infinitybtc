<!DOCTYPE html>
<html>
<head>
<title>InfinityBTC</title>

<style>
body {margin:0;font-family:Arial;background:#0a0a0a;color:white;}
nav {padding:20px;background:#111;}
nav a {margin-right:15px;color:white;cursor:pointer;}
.section {display:none;padding:40px;text-align:center;}
.active {display:block;}
.card {border:1px solid #333;padding:20px;margin:20px;display:inline-block;}
button {padding:10px;background:orange;border:none;}
</style>

</head>

<body>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('catalogue')">Catalogue</a>
<a onclick="show('account')">Account</a>
<a onclick="show('cart')">Cart</a>
</nav>

<div id="home" class="section active">
<h1>Infinity BTC</h1>
<p>Physical Bitcoin collectible cards</p>
<button onclick="show('catalogue')">View Catalogue</button>
</div>

<div id="catalogue" class="section">
<h2>Catalogue</h2>

<div class="card">
<h3>Black Edition</h3>
<p>0.1 BTC</p>
<button onclick="add()">Add to cart</button>
</div>

</div>

<div id="account" class="section">
<h2>Account</h2>
<input id="email" placeholder="Email"><br><br>
<input placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="cart" class="section">
<h2>Cart</h2>
<p id="cartText">Empty</p>
</div>

<script>
function show(page){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(page).classList.add('active');
}

function login(){
localStorage.setItem("user","ok");
alert("Logged in");
show("catalogue");
}

function add(){
if(!localStorage.getItem("user")){
alert("Login first");
show("account");
return;
}
document.getElementById("cartText").innerText="1 item added";
}
</script>

</body>
</html>
